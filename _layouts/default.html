<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.name }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/normalize.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">

  <!-- Icons -->
  <script defer src="https://use.fontawesome.com/releases/v5.8.1/js/all.js" integrity="sha384-g5uSoOSBd7KkhAMlnQILrecXvzst9TdC09/VM+pjDTCM+1il8RHz5fKANTFFb+gQ" crossorigin="anonymous"></script>

  {% include analytics.html %}
</head>
<body>

  <!-- FIXED NAV -->
  <nav id="site-nav">
    <div class="nav-inner">
      <a href="/#hero" class="nav-logo">Jamie McCaw</a>

      <!-- Desktop links -->
      <ul class="nav-links">
        <li><a href="/#work">Work</a></li>
        <li><a href="/#about">About</a></li>
        <li><a href="/#connect">Connect</a></li>
      </ul>

      <!-- Mobile hamburger -->
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <!-- Mobile dropdown -->
    <div class="nav-mobile-menu" id="nav-mobile-menu" aria-hidden="true">
      <ul>
        <li><a href="/#work" class="nav-mobile-link">Work</a></li>
        <li><a href="/#about" class="nav-mobile-link">About</a></li>
        <li><a href="/#connect" class="nav-mobile-link">Connect</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main>
    {{ content }}
  </main>

  <!-- FOOTER -->
  <footer id="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; 2025 Jamie McCaw</span>
      <div class="footer-links">
        <a href="https://linkedin.com/in/jamiemccaw" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/jamie-mccaw" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="/assets/js/nav.js"></script>
</body>
</html>
